<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Glass | The Future is Clear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav class="p-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter">AETHER</div>
        <button class="bg-blue-600 px-4 py-2 rounded-full text-sm">Pre-order</button>
    </nav>
    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl font-extrabold mb-4">The world's thinnest AR glasses.</h1>
        <p class="text-gray-400 text-xl mb-8">Experience reality, upgraded. Built by AetherSystems.</p>
        <div class="w-full max-w-2xl mx-auto h-64 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl shadow-2xl flex items-center justify-center">
             <span class="text-6xl">👓</span>
        </div>
    </header>
    <section class="p-12 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="bg-gray-800 p-8 rounded-2xl">
            <h3 class="text-xl font-bold mb-2">8K Display</h3>
            <p class="text-gray-400">Crisp visuals that blend seamlessly with your environment.</p>
        </div>
        <div class="bg-gray-800 p-8 rounded-2xl">
            <h3 class="text-xl font-bold mb-2">24h Battery</h3>
            <p class="text-gray-400">Power that lasts as long as your ambition does.</p>
        </div>
        <div class="bg-gray-800 p-8 rounded-2xl">
            <h3 class="text-xl font-bold mb-2">AI Native</h3>
            <p class="text-gray-400">Real-time translation and object recognition built-in.</p>
        </div>
    </section>
</body>
</html>
