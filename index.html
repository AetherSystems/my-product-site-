
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Site Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-gray-800 rounded-3xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">SiteBot v1</h1>
        <p class="text-gray-400 mb-6 text-sm">Type a product name to generate a site snippet.</p>
        
        <div id="chat-window" class="space-y-4 mb-6 max-h-64 overflow-y-auto pr-2">
            <div class="bg-gray-700 p-3 rounded-2xl rounded-tl-none text-sm w-3/4">
                Hello! What kind of product site should I design for you today?
            </div>
        </div>

        <div class="flex gap-2">
            <input id="user-input" type="text" placeholder="e.g. Luxury Watch" class="flex-1 bg-gray-700 border-none rounded-full px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            <button onclick="sendRequest()" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-full transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        async function sendRequest() {
            const input = document.getElementById('user-input');
            const window = document.getElementById('chat-window');
            if (!input.value) return;

            // Add user message
            window.innerHTML += `<div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none text-sm w-3/4 ml-auto text-right">${input.value}</div>`;
            
            const product = input.value;
            input.value = '';
            
            // Add bot thinking state
            const botId = "bot-" + Date.now();
            window.innerHTML += `<div id="${botId}" class="bg-gray-700 p-3 rounded-2xl rounded-tl-none text-sm w-3/4 animate-pulse">Thinking...</div>`;
            window.scrollTop = window.scrollHeight;

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: `Write 3 catchy features for a product called ${product}. Keep it short.` })
                });
                const data = await response.json();
                const text = data[0].generated_text.split("Short.")[1] || data[0].generated_text;
                
                document.getElementById(botId).classList.remove('animate-pulse');
                document.getElementById(botId).innerText = text;
            } catch (e) {
                document.getElementById(botId).innerText = "The AI is currently busy. Try again in a minute!";
                document.getElementById(botId).classList.remove('animate-pulse');
            }
        }
    </script>
</body>
</html>
